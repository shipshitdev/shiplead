name: Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v0.1.0). Must match an existing GitHub release."
        required: true
        type: string
      deploy_web:
        description: "Deploy apps/web to Vercel production"
        required: false
        type: boolean
        default: true
      build_linux:
        description: "Build + upload desktop Linux installers (AppImage + deb)"
        required: false
        type: boolean
        default: true
      build_macos:
        description: "Build + upload desktop macOS installers (unsigned dmg + zip)"
        required: false
        type: boolean
        default: true
      update_homebrew:
        description: "Update the shiplead cask in shipshitdev/homebrew-tap"
        required: false
        type: boolean
        default: true
      publish_cli:
        description: "Publish the CLI to npm via Trusted Publisher"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.13"
  NODE_VERSION: "22"
  VERCEL_ORG_ID_WEB: "team_hFVCbNU4RnfEpQOeSWRxmhEJ"
  VERCEL_PROJECT_ID_WEB: "prj_kF44uQIXP7KV84sL19aaDvMc1KeE"

jobs:
  deploy-web:
    if: ${{ inputs.deploy_web }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID_WEB }}
      VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID_WEB }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Vercel CLI
        run: npm install --global vercel@50.7.1
      - name: Install dependencies
        run: bun install
      - name: Pull Vercel project settings
        run: vercel pull --cwd apps/web --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"
      - name: Build Vercel artifact
        run: vercel build --cwd apps/web --prod --token "${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy web to Vercel production
        run: vercel deploy --cwd apps/web --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"

  build-desktop-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: bun install
      - name: Set desktop version from release tag
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          cd apps/desktop && npm version "$VERSION" --no-git-tag-version
      - name: Build desktop app
        run: cd apps/desktop && bun run build:code
      - name: Package Linux installers
        run: cd apps/desktop && npx electron-builder --linux --publish never
      - name: Upload Linux binaries to release
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            apps/desktop/out/*.AppImage \
            apps/desktop/out/*.deb \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-macos:
    if: ${{ inputs.build_macos }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: bun install
      - name: Set desktop version from release tag
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          cd apps/desktop && npm version "$VERSION" --no-git-tag-version
      - name: Build desktop app
        run: cd apps/desktop && bun run build:code
      - name: Package macOS installers
        run: cd apps/desktop && npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload macOS binaries to release
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            apps/desktop/out/*.dmg \
            apps/desktop/out/*.zip \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-cask:
    if: ${{ inputs.build_macos && inputs.update_homebrew && secrets.HOMEBREW_TAP_TOKEN != '' }}
    needs: build-desktop-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: shipshitdev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: master
      - name: Download macOS release artifacts
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          gh release download "v${VERSION}" \
            --repo shipshitdev/shiplead \
            --pattern "*.dmg" \
            --dir ./artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute SHA256 hashes
        id: sha
        run: |
          ARM_FILE=$(ls artifacts/*-arm64.dmg 2>/dev/null | head -1)
          INTEL_FILE=$(ls artifacts/*-x64.dmg 2>/dev/null | head -1)
          if [ -n "$ARM_FILE" ]; then
            echo "arm_sha=$(shasum -a 256 "$ARM_FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$INTEL_FILE" ]; then
            echo "intel_sha=$(shasum -a 256 "$INTEL_FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          fi
      - name: Update cask version and SHA256
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/shiplead.rb
          sed -i "s|arm:   \"[a-f0-9]*\"|arm:   \"${{ steps.sha.outputs.arm_sha }}\"|" Casks/shiplead.rb
          sed -i "s|intel: \"[a-f0-9]*\"|intel: \"${{ steps.sha.outputs.intel_sha }}\"|" Casks/shiplead.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/shiplead.rb
          git commit -m "chore: bump shiplead to ${{ inputs.release_tag }}"
          git push

  publish-cli:
    if: ${{ inputs.publish_cli }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - name: Build CLI and dependencies
        run: bun run build --filter=@shipshitdev/shiplead
      - name: Set version from release tag
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          cd apps/cli && npm version "$VERSION" --no-git-tag-version
      - name: Publish to npm (OIDC / Trusted Publisher)
        run: cd apps/cli && npm publish --access public --provenance
